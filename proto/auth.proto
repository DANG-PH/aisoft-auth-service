syntax = "proto3";

package auth;

service AuthService {
  rpc Register (RegisterRequest) returns (RegisterResponse) {};
  rpc Login (LoginRequest) returns (LoginResponse) {};
  rpc VerifyOtp (VerifyOtpRequest) returns (VerifyOtpResponse) {};
  rpc Refresh (RefreshRequest) returns (RefreshResponse) {};
  rpc LoginWithGoogle (LoginWithGoogleRequest) returns (LoginWithGoogleResponse) {};
  rpc DeleteUser (DeleteUserRequest) returns (DeleteUserResponse) {};
  rpc UpdateEmail (UpdateEmailRequest) returns (UpdateEmailResponse) {}; 
  rpc GetProfileAuth (GetProfileAuthRequest) returns (GetProfileAuthResponse) {};
}

message RegisterRequest {
  string username = 1;
  string password = 2;
  string email = 3;
  string realname = 4;
}

message RegisterResponse {
  bool success = 1;
}

message LoginRequest {
  string username = 1;
  string password = 2;
}

message LoginResponse {
  string sessionId = 1;
}

message VerifyOtpRequest {
  string sessionId = 1;
  string otp = 2;
}

message VerifyOtpResponse {
  string access_token = 1;
  string refresh_token = 2;
}

message RefreshRequest {
  string refreshToken = 1;
}

message RefreshResponse {
  string access_token = 1;
  string refresh_token = 2;
}

message LoginWithGoogleRequest {
  string tokenFromGoogle = 1;
}

message LoginWithGoogleResponse {
  string access_token = 1;
  string refresh_token = 2;
  bool register = 3;
}

message DeleteUserRequest {
  int32 userId = 1;
}

message DeleteUserResponse {
  bool success = 1;
}

message UpdateEmailRequest {
  int32 userId = 1;
  string email = 2;
}

message UpdateEmailResponse {
  bool success = 1;
}

message GetProfileAuthRequest {
  int32 userId = 1;
}

message GetProfileAuthResponse {
  string username = 1;
  string email = 2;
  string role = 3;
}